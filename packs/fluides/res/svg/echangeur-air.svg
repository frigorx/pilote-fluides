<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" role="img"
     aria-label="Le condenseur à air : l'air froid entre d'un côté, traverse la batterie ailetée poussé par le ventilateur, ressort réchauffé. Batterie sale : la haute pression monte.">
  <title>Le condenseur à air : l'air emporte la chaleur</title>

  <style>
    .t   { font:700 19px Calibri,Segoe UI,sans-serif; fill:#1b3a63; }
    .l   { font:700 15px Calibri,Segoe UI,sans-serif; fill:#1b3a63; }
    .s   { font:400 13.5px Calibri,Segoe UI,sans-serif; fill:#4a5b6e; }
    .k   { font:700 14px Calibri,Segoe UI,sans-serif; fill:#c9451a; }
    .sym { stroke:#33475b; stroke-width:1.6; fill:none; }
    .airF{ animation:air 2.2s linear infinite; }
    .airC{ animation:air 2.2s linear infinite; }
    @keyframes air { 0% { transform:translateX(0); opacity:0; } 18% { opacity:1; }
                     82% { opacity:1; } 100% { transform:translateX(120px); opacity:0; } }
    .helice { transform-box:fill-box; transform-origin:center; animation:spin 1.6s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    @media (prefers-reduced-motion:reduce) { .airF,.airC,.helice { animation:none; } .airF,.airC { opacity:1; } }
  </style>

  <defs>
    <marker id="af" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="4.5" markerHeight="4.5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a9bd5"/>
    </marker>
    <marker id="ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="4.5" markerHeight="4.5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#ff6b35"/>
    </marker>
  </defs>

  <rect width="900" height="400" fill="#ffffff"/>

  <text class="t" x="40" y="36">L'air emporte la chaleur — si on le laisse passer</text>

  <!-- batterie ailetée -->
  <g transform="translate(430,190)">
    <rect x="-70" y="-110" width="140" height="220" rx="5" fill="#fff" stroke="#33475b" stroke-width="2.4"/>
    <!-- ailettes -->
    <path class="sym" d="M -70 -88 L 70 -88 M -70 -60 L 70 -60 M -70 -32 L 70 -32 M -70 -4 L 70 -4 M -70 24 L 70 24 M -70 52 L 70 52 M -70 80 L 70 80" style="stroke-width:1;stroke-dasharray:3 5"/>
    <!-- serpentin vertical (le fluide) -->
    <path class="sym" d="M -34 -110 L -34 96 A 17 14 0 0 0 0 96 L 0 -96 A 17 14 0 0 1 34 -96 L 34 110" style="stroke:#ff6b35;stroke-width:3"/>
    <text class="l" x="0" y="140" text-anchor="middle">Batterie ailetée</text>
    <text class="s" x="0" y="160" text-anchor="middle">le fluide HP circule dans le serpentin</text>
  </g>

  <!-- air entrant (frais) -->
  <g class="airF">
    <path d="M 180 120 L 260 120" stroke="#5a9bd5" stroke-width="5" fill="none" marker-end="url(#af)"/>
    <path d="M 160 190 L 240 190" stroke="#5a9bd5" stroke-width="5" fill="none" marker-end="url(#af)"/>
    <path d="M 180 260 L 260 260" stroke="#5a9bd5" stroke-width="5" fill="none" marker-end="url(#af)"/>
  </g>
  <text class="l" x="205" y="86" text-anchor="middle" style="fill:#3a72a8">air ambiant</text>

  <!-- air sortant (chaud) -->
  <g class="airC">
    <path d="M 520 120 L 600 120" stroke="#ff6b35" stroke-width="5" fill="none" marker-end="url(#ac)"/>
    <path d="M 540 190 L 620 190" stroke="#ff6b35" stroke-width="5" fill="none" marker-end="url(#ac)"/>
    <path d="M 520 260 L 600 260" stroke="#ff6b35" stroke-width="5" fill="none" marker-end="url(#ac)"/>
  </g>
  <text class="l" x="608" y="86" text-anchor="middle" style="fill:#c9451a">air réchauffé</text>

  <!-- ventilateur -->
  <g transform="translate(700,190) scale(2)" class="sym">
    <circle cx="0" cy="0" r="15" fill="#fff"/>
    <g class="helice">
      <path d="M -6 -7 A 6 6 0 0 1 0 -1 M -1 0 A 6 6 0 0 1 -7 -6 M -7 6 A 6 6 0 0 1 -1 0 M 0 1 A 6 6 0 0 1 -6 7"/>
    </g>
    <ellipse cx="4.5" cy="0" rx="4.5" ry="2.5"/>
    <path d="M -7 -13 L 13 -7 M -7 13 L 13 7"/>
  </g>
  <text class="l" x="700" y="248" text-anchor="middle">Ventilateur</text>
  <text class="s" x="700" y="267" text-anchor="middle">force l'air à travers</text>

  <!-- encart panne -->
  <g transform="translate(790,110)">
    <rect x="-68" y="-60" width="168" height="98" rx="8" fill="#fff6f2" stroke="#ffc7ad" stroke-width="1.5"/>
    <text class="k" x="15" y="-34" text-anchor="middle">Batterie sale ?</text>
    <text class="s" x="-48" y="-10">l'air ne passe plus,</text>
    <text class="s" x="-48" y="8">la HP monte, la machine</text>
    <text class="s" x="-48" y="26">consomme — puis coupe.</text>
  </g>

  <text class="s" x="40" y="388">Même échangeur côté froid : à l'évaporateur, l'air cède sa chaleur au fluide — et un filtre encrassé produit le givrage complet.</text>
</svg>
