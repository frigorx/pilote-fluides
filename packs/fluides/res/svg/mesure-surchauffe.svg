<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" role="img"
     aria-label="Mesurer la surchauffe : un manomètre BP donne la température de saturation par la table, une sonde de contact donne la température du tube, la différence est la surchauffe.">
  <title>Mesurer la surchauffe</title>

  <style>
    .t   { font:700 19px Calibri,Segoe UI,sans-serif; fill:#1b3a63; }
    .l   { font:700 15px Calibri,Segoe UI,sans-serif; fill:#1b3a63; }
    .s   { font:400 13.5px Calibri,Segoe UI,sans-serif; fill:#4a5b6e; }
    .f   { font:700 17px Calibri,Segoe UI,sans-serif; fill:#1b3a63; }
    .sym { stroke:#33475b; stroke-width:1.6; fill:none; }
    .bp  { stroke:#1b3a63; stroke-width:5; fill:none; stroke-linecap:round; }
    .flux{ fill:none; stroke:#fff; stroke-opacity:.9; stroke-width:2.4; stroke-linecap:round;
           stroke-dasharray:0.1 16; animation:flux 1.2s linear infinite; }
    @keyframes flux { to { stroke-dashoffset:-16.1; } }
    @media (prefers-reduced-motion:reduce) { .flux { animation:none; } }
  </style>

  <rect width="900" height="360" fill="#ffffff"/>

  <text class="t" x="40" y="36">La surchauffe se mesure en deux points</text>

  <!-- évaporateur -->
  <g transform="translate(150,190)">
    <rect x="-90" y="-55" width="180" height="110" rx="5" fill="#fff" stroke="#33475b" stroke-width="2.2"/>
    <path class="sym" d="M -90 -30 L 70 -30 A 12 12 0 0 1 70 -6 L -70 -6 A 12 12 0 0 0 -70 18 L 90 18" style="stroke-width:1.8"/>
    <path class="sym" d="M -58 -55 L -58 55 M -20 -55 L -20 55 M 18 -55 L 18 55 M 56 -55 L 56 55" style="stroke-width:1;stroke-dasharray:3 5"/>
    <text class="l" x="0" y="82" text-anchor="middle">Évaporateur</text>
  </g>

  <!-- ligne d'aspiration -->
  <path class="bp" d="M 240 208 L 700 208 L 700 250"/>
  <path class="flux" d="M 240 208 L 700 208 L 700 250"/>
  <text class="s" x="470" y="238" text-anchor="middle">ligne d'aspiration → compresseur</text>

  <!-- prise manomètre BP -->
  <g>
    <path class="sym" d="M 380 200 L 380 150" style="stroke-width:2.4"/>
    <circle cx="380" cy="122" r="30" fill="#fff" stroke="#33475b" stroke-width="2.4"/>
    <path class="sym" d="M 380 122 L 396 106" style="stroke-width:2.4"/>
    <text class="l" x="380" y="72" text-anchor="middle">① Manomètre BP</text>
    <text class="s" x="380" y="92" text-anchor="middle">pression → table → <tspan style="font-weight:700">T° de saturation</tspan></text>
  </g>

  <!-- sonde de contact -->
  <g>
    <rect x="560" y="196" width="36" height="24" rx="5" fill="#c6d3df" stroke="#33475b" stroke-width="2"/>
    <path class="sym" d="M 578 196 L 578 156" style="stroke-width:2.4"/>
    <rect x="548" y="120" width="60" height="36" rx="6" fill="#fff" stroke="#33475b" stroke-width="2.4"/>
    <text class="l" x="578" y="72" text-anchor="middle">② Sonde de contact</text>
    <text class="s" x="578" y="92" text-anchor="middle"><tspan style="font-weight:700">T° réelle du tube</tspan>, au même endroit</text>
  </g>

  <!-- formule -->
  <g transform="translate(770,150)">
    <rect x="-95" y="-42" width="212" height="120" rx="8" fill="#f5f8fb" stroke="#d7e0e8" stroke-width="1.5"/>
    <text class="f" x="10" y="-12" text-anchor="middle">surchauffe =</text>
    <text class="f" x="10" y="12" text-anchor="middle">T° tube − T° saturation</text>
    <text class="s" x="10" y="42" text-anchor="middle">repère sain : <tspan style="font-weight:700;fill:#1b3a63">5 à 10 K</tspan></text>
    <text class="s" x="10" y="62" text-anchor="middle">0 K = coup de liquide !</text>
  </g>

  <text class="s" x="40" y="330">Même logique en sortie de condenseur : T° saturation − T° du tube = <tspan style="font-weight:700;fill:#1b3a63">sous-refroidissement</tspan> (4 à 8 K).</text>
  <text class="s" x="40" y="349">Ne pas oublier : le manomètre lit en relatif — pression absolue ≈ relative + 1 bar avant d'ouvrir la table.</text>
</svg>
