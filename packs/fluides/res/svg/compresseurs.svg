<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 430" role="img"
     aria-label="Le compresseur : coupe animée d'un piston qui aspire et refoule, et les quatre technologies avec leur symbole normalisé.">
  <title>Le compresseur — principe et technologies</title>

  <style>
    .t  { font:700 19px Calibri,Segoe UI,sans-serif; fill:#1b3a63; }
    .l  { font:700 15px Calibri,Segoe UI,sans-serif; fill:#1b3a63; }
    .s  { font:400 13.5px Calibri,Segoe UI,sans-serif; fill:#4a5b6e; }
    .bp { font:700 14px Calibri,Segoe UI,sans-serif; fill:#1b3a63; }
    .hp { font:700 14px Calibri,Segoe UI,sans-serif; fill:#c9451a; }
    .sym { stroke:#33475b; stroke-width:1.1; fill:none; }
    .piston { animation:piston 2.6s ease-in-out infinite; }
    @keyframes piston { 0%,100% { transform:translateY(0); } 50% { transform:translateY(118px); } }
    .asp { animation:asp 2.6s linear infinite; }
    @keyframes asp { 0%,6% { opacity:0; } 14%,44% { opacity:1; } 52%,100% { opacity:0; } }
    .ref { animation:ref 2.6s linear infinite; }
    @keyframes ref { 0%,54% { opacity:0; } 62%,94% { opacity:1; } 100% { opacity:0; } }
    @media (prefers-reduced-motion:reduce) { .piston,.asp,.ref { animation:none; } .asp,.ref { opacity:1; } }
  </style>

  <defs>
    <marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1b3a63"/>
    </marker>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ff6b35"/>
    </marker>
  </defs>

  <rect width="900" height="430" fill="#ffffff"/>

  <!-- ==================== GAUCHE : coupe animée ==================== -->
  <text class="t" x="40" y="36">Dans le cylindre</text>
  <text class="bp" x="60" y="62">aspiration (BP)</text>
  <text class="hp" x="320" y="62" text-anchor="end">refoulement (HP)</text>

  <!-- tubulures -->
  <path class="sym" style="stroke-width:2.2" d="M 60 90 L 122 90 L 122 106"/>
  <path class="sym" style="stroke-width:2.2" d="M 258 106 L 258 90 L 320 90"/>
  <!-- culasse -->
  <path d="M 96 106 L 110 106 M 134 106 L 246 106 M 270 106 L 284 106" stroke="#33475b" stroke-width="7"/>
  <!-- cylindre -->
  <path d="M 100 106 L 100 356 M 280 106 L 280 356 M 100 356 L 280 356" stroke="#33475b" stroke-width="7"/>

  <!-- flèches de gaz -->
  <g class="asp">
    <path d="M 66 76 L 112 76" stroke="#1b3a63" stroke-width="5" fill="none" marker-end="url(#ab)"/>
    <path d="M 122 114 L 122 146" stroke="#1b3a63" stroke-width="5" fill="none" marker-end="url(#ab)" stroke-opacity=".85"/>
  </g>
  <g class="ref">
    <path d="M 258 146 L 258 116" stroke="#ff6b35" stroke-width="5" fill="none" marker-end="url(#ah)" stroke-opacity=".9"/>
    <path d="M 268 76 L 314 76" stroke="#ff6b35" stroke-width="5" fill="none" marker-end="url(#ah)"/>
  </g>

  <!-- piston -->
  <g class="piston">
    <rect x="106" y="162" width="168" height="50" rx="4" fill="#c6d3df" stroke="#33475b" stroke-width="2.5"/>
    <path d="M 106 178 L 274 178" stroke="#33475b" stroke-width="1.4"/>
    <path d="M 178 212 L 168 248 M 202 212 L 212 248" stroke="#33475b" stroke-width="4" stroke-linecap="round"/>
  </g>

  <text class="s" x="190" y="392" text-anchor="middle">Le piston <tspan style="font-weight:700;fill:#1b3a63">aspire en descendant</tspan>,</text>
  <text class="s" x="190" y="412" text-anchor="middle"><tspan style="font-weight:700;fill:#c9451a">refoule en remontant</tspan> — seul organe actif du circuit.</text>

  <!-- ==================== DROITE : les 4 technologies ==================== -->
  <text class="t" x="410" y="36">Quatre technologies, un même symbole</text>

  <!-- piston -->
  <g transform="translate(520,130) scale(2.4)" class="sym">
    <circle cx="0" cy="0" r="15" fill="#fff"/>
    <path d="M -15 0 L -16 0 M 15 0 L 16 0"/>
    <path d="M -7 -13 L 13 -7 M -7 13 L 13 7"/>
    <path d="M -4 0 L 5 0 M -5 -5 L -5 5"/>
  </g>
  <text class="l" x="520" y="186" text-anchor="middle">À piston</text>
  <text class="s" x="520" y="205" text-anchor="middle">le plus ancien, encore</text>
  <text class="s" x="520" y="222" text-anchor="middle">partout en froid commercial</text>

  <!-- rotatif -->
  <g transform="translate(775,130) scale(2.4)" class="sym">
    <circle cx="0" cy="0" r="15" fill="#fff"/>
    <circle cx="0" cy="0" r="3.5"/>
    <path d="M 0 -2 L 0 2 M 3 0 L 0 0"/>
    <path d="M -15 0 L -16 0 M 15 0 L 16 0"/>
    <path d="M -7 -13 L 13 -7 M -7 13 L 13 7"/>
  </g>
  <text class="l" x="775" y="186" text-anchor="middle">Rotatif</text>
  <text class="s" x="775" y="205" text-anchor="middle">petits climatiseurs,</text>
  <text class="s" x="775" y="222" text-anchor="middle">monoblocs</text>

  <!-- scroll -->
  <g transform="translate(520,290) scale(2.4)" class="sym">
    <circle cx="0" cy="0" r="15" fill="#fff"/>
    <path d="M -15 0 L -16 0 M 15 0 L 16 0"/>
    <path d="M -7 -13 L 13 -7 M -7 13 L 13 7"/>
    <path d="M 0 4.5 A 4.5 4.5 0 0 1 0 -4.5 M 0 -2.5 A 3.5 3.5 0 0 1 0 4.5 M 0 2.5 A 2.5 2.5 0 0 1 0 -2.5 M 0 -0.5 A 1.5 1.5 0 0 1 0 2.5"/>
  </g>
  <text class="l" x="520" y="346" text-anchor="middle">Scroll (spirales)</text>
  <text class="s" x="520" y="365" text-anchor="middle">climatisation et PAC :</text>
  <text class="s" x="520" y="382" text-anchor="middle">silencieux, bon retour d'huile</text>

  <!-- vis -->
  <g transform="translate(775,290) scale(2.4)" class="sym">
    <circle cx="0" cy="0" r="15" fill="#fff"/>
    <path d="M -15 0 L -16 0 M 15 0 L 16 0"/>
    <path d="M -7 -13 L 13 -7 M -7 13 L 13 7"/>
    <path d="M 0 -5 L 5 0 L 0 5 M -4 -5 L 1 0 L -4 5"/>
  </g>
  <text class="l" x="775" y="346" text-anchor="middle">À vis</text>
  <text class="s" x="775" y="365" text-anchor="middle">grandes puissances,</text>
  <text class="s" x="775" y="382" text-anchor="middle">froid industriel</text>

  <text class="hp" x="648" y="420" text-anchor="middle">Un seul des groupes 6 à 9 est tiré au sort à l'épreuve — donc les quatre s'apprennent.</text>
</svg>
